<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Bài Viết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1 class="text-center">Quản Lý Bài Viết</h1>

    <h2 class="mt-4">Thêm / Chỉnh Sửa Bài Viết</h2>
    <div class="mb-3">
        <input type="hidden" id="editId">
        <input type="text" id="postTitle" class="form-control mb-2" placeholder="Nhập tiêu đề bài viết">
        <select id="authorDropdown" class="form-select mb-2"></select>
        <label for="postViews">Lượt xem:</label>
        <input type="number" id="postViews" min="0" class="form-control">
        <button class="btn btn-primary mt-2" onclick="addOrUpdatePost()">Lưu bài viết</button>
    </div>

    <h2 class="mt-4">Danh Sách Bài Viết</h2>
    <table class="table table-bordered mt-2">
        <thead>
            <tr>
                <th>Tiêu đề</th>
                <th>Tác giả</th>
                <th>Lượt xem</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="postList"></tbody>
    </table>

    <h2 class="mt-4">Bài Viết Đã Xóa</h2>
    <table class="table table-bordered mt-2">
        <thead>
            <tr>
                <th>Tiêu đề</th>
                <th>Tác giả</th>
                <th>Lượt xem</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="deletedPostList"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
